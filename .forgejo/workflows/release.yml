name: Release Images

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: forgejo.gitgud.zip
  REPO: stasaberg

jobs:
  build-and-push:
    runs-on: self-hosted
    strategy:
      matrix:
        include:
          - name: frontend
            dockerfile: docker/Dockerfile
            build_args: --build-arg WASM_OPT=0
          - name: api-gateway
            dockerfile: docker/api-gateway.Dockerfile
            build_args: ""
          - name: radio-service
            dockerfile: docker/radio-service.Dockerfile
            build_args: ""
          - name: terminal-service
            dockerfile: docker/terminal.Dockerfile
            build_args: ""
          - name: fmd
            dockerfile: docker/fmd.Dockerfile
            build_args: ""
    steps:
      - uses: actions/checkout@v4
      - name: Login to registry
        run: docker login $REGISTRY -u stasaberg -p ${{ secrets.FORGEJO_TOKEN }}
      - name: Set release tags
        id: tags
        run: |
          REF="${{ github.ref_name }}"
          if ! echo "$REF" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Unsupported release tag format: $REF"
            exit 1
          fi
          MAJOR=$(echo "$REF" | cut -d. -f1)
          MINOR=$(echo "$REF" | cut -d. -f2)
          echo "primary=$REF" >> "$GITHUB_OUTPUT"
          echo "extra=${MAJOR}.${MINOR} ${MAJOR}" >> "$GITHUB_OUTPUT"
      - name: Build & push release image
        run: |
          IMAGE="$REGISTRY/$REPO/${{ matrix.name }}"
          docker build -f ${{ matrix.dockerfile }} \
            ${{ matrix.build_args }} \
            -t "$IMAGE:${{ steps.tags.outputs.primary }}" \
            .
          docker push "$IMAGE:${{ steps.tags.outputs.primary }}"
          for tag in ${{ steps.tags.outputs.extra }}; do
            docker tag "$IMAGE:${{ steps.tags.outputs.primary }}" "$IMAGE:$tag"
            docker push "$IMAGE:$tag"
          done
