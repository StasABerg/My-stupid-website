name: Build & Push Images

on:
  push:
    branches: [main, feat/docker-compose-migration]

env:
  REGISTRY: forgejo.gitgud.zip
  REPO: stasaberg

jobs:
  build-frontend:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Login to registry
        run: docker login $REGISTRY -u stasaberg -p ${{ secrets.FORGEJO_TOKEN }}
      - name: Set tag
        id: tag
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev" >> "$GITHUB_OUTPUT"
          fi
      - name: Build & push frontend
        run: |
          docker build -f docker/Dockerfile \
            -t $REGISTRY/$REPO/frontend:${{ steps.tag.outputs.tag }} \
            --build-arg WASM_OPT=0 \
            .
          docker push $REGISTRY/$REPO/frontend:${{ steps.tag.outputs.tag }}

  build-api-gateway:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
