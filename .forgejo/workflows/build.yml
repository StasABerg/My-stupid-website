        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev" >> "$GITHUB_OUTPUT"
          fi
      - name: Build & push radio-service
        run: |
          docker build -f docker/radio-service.Dockerfile \
            -t $REGISTRY/$REPO/radio-service:${{ steps.tag.outputs.tag }} \
