          fi
      - name: Build & push api-gateway
        run: |
          docker build -f docker/api-gateway.Dockerfile \
            -t $REGISTRY/$REPO/api-gateway:${{ steps.tag.outputs.tag }} \
            .
          docker push $REGISTRY/$REPO/api-gateway:${{ steps.tag.outputs.tag }}

