name: Build & Push Images

on:
  push:
    branches: [main, feat/docker-compose-migration]

env:
  REGISTRY: forgejo.gitgud.zip
  REPO: stasaberg

jobs:
  build-frontend:
    runs-on: self-hosted
    steps:
      - name: Clone repo
        run: |
          WORKDIR="/tmp/build-frontend-$$"
          git clone --depth 1 --branch ${{ github.ref_name }} http://localhost:3000/stasaberg/My-stupid-website.git "$WORKDIR"
          echo "WORKDIR=$WORKDIR" >> "$GITHUB_ENV"
      - name: Login to registry
        run: docker login $REGISTRY -u stasaberg -p ${{ secrets.FORGEJO_TOKEN }}
      - name: Set tag
        id: tag
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev" >> "$GITHUB_OUTPUT"
          fi
      - name: Build & push frontend
        run: |
          docker build -f docker/Dockerfile \
            -t $REGISTRY/$REPO/frontend:${{ steps.tag.outputs.tag }} \
            --build-arg WASM_OPT=0 \
            .
        workdir: ${{ env.WORKDIR }}
      - name: Cleanup
        if: always()
        run: rm -rf "$WORKDIR"

  build-api-gateway:
    runs-on: self-hosted
    steps:
      - name: Clone repo
        run: |
          WORKDIR="/tmp/build-gateway-$$"
          git clone --depth 1 --branch ${{ github.ref_name }} http://localhost:3000/stasaberg/My-stupid-website.git "$WORKDIR"
