name: Build CI Images

on:
  push:
    branches: ["**"]

env:
  REGISTRY: forgejo.gitgud.zip
  REPO: stasaberg

jobs:
  build-and-push:
    runs-on: self-hosted
    strategy:
      matrix:
        include:
          - name: frontend
            dockerfile: docker/Dockerfile
            build_args: --build-arg WASM_OPT=0
          - name: api-gateway
            dockerfile: docker/api-gateway.Dockerfile
            build_args: ""
          - name: radio-service
            dockerfile: docker/radio-service.Dockerfile
            build_args: ""
          - name: terminal-service
            dockerfile: docker/terminal.Dockerfile
            build_args: ""
          - name: fmd
            dockerfile: docker/fmd.Dockerfile
            build_args: ""
    steps:
      - uses: actions/checkout@v4
      - name: Login to registry
        run: docker login $REGISTRY -u stasaberg -p ${{ secrets.FORGEJO_TOKEN }}
      - name: Set CI tags
        id: tags
        run: |
          SAFE_REF=$(echo "${{ github.ref_name }}" | tr '/:@ ' '-' | tr -cd '[:alnum:]._-')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-12)
          PRIMARY="ci-${SAFE_REF}-${{ github.run_number }}"
          EXTRA="sha-${SHORT_SHA}"
          echo "primary=${PRIMARY}" >> "$GITHUB_OUTPUT"
          echo "extra=${EXTRA}" >> "$GITHUB_OUTPUT"
      - name: Build & push image
        run: |
          IMAGE="$REGISTRY/$REPO/${{ matrix.name }}"
          docker build -f ${{ matrix.dockerfile }} \
            ${{ matrix.build_args }} \
            -t "$IMAGE:${{ steps.tags.outputs.primary }}" \
            .
          docker push "$IMAGE:${{ steps.tags.outputs.primary }}"
          for tag in ${{ steps.tags.outputs.extra }}; do
            docker tag "$IMAGE:${{ steps.tags.outputs.primary }}" "$IMAGE:$tag"
            docker push "$IMAGE:$tag"
          done

  deploy-dev:
    needs: build-and-push
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set image tag
        id: tags
        run: |
          SAFE_REF=$(echo "${{ github.ref_name }}" | tr '/:@ ' '-' | tr -cd '[:alnum:]._-')
          echo "tag=ci-${SAFE_REF}-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
      - name: Deploy dev
        run: |
          git config --global --add safe.directory /opt/my-stupid-website-dev
          cd /opt/my-stupid-website-dev
          git pull origin main
          cp .env.production .env
          echo "IMAGE_TAG=${{ steps.tags.outputs.tag }}" >> .env
          docker compose -p website-dev -f docker-compose.website.yml --env-file .env pull
          docker compose -p website-dev -f docker-compose.website.yml --env-file .env up -d --remove-orphans

  deploy-prod:
    needs: build-and-push
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set image tag
        id: tags
        run: |
          SAFE_REF=$(echo "${{ github.ref_name }}" | tr '/:@ ' '-' | tr -cd '[:alnum:]._-')
          echo "tag=ci-${SAFE_REF}-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
      - name: Deploy prod
        run: |
          git config --global --add safe.directory /opt/my-stupid-website
          cd /opt/my-stupid-website
          git pull origin main
          cp .env.production .env
          echo "IMAGE_TAG=${{ steps.tags.outputs.tag }}" >> .env
          docker compose -p website-prod -f docker-compose.website.yml --env-file .env pull
          docker compose -p website-prod -f docker-compose.website.yml --env-file .env up -d --remove-orphans
